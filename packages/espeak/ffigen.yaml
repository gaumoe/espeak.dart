name: EspeakNativeBindings
description: Auto-generated FFI bindings for espeak-ng
output: lib/src/bindings_generated.dart

ffi-native:
  asset-id: 'package:espeak/espeak_native'

headers:
  entry-points:
    - native/espeak-ng/src/include/espeak-ng/speak_lib.h
    - native/espeak-ng/src/include/espeak-ng/espeak_ng.h

compiler-opts:
  - -Inative
  - -Inative/espeak-ng/src/include

functions:
  include:
    - 'espeak_Initialize'
    - 'espeak_SetVoiceByName'
    - 'espeak_TextToPhonemes'
    - 'espeak_Terminate'
    - 'espeak_ng_InitializePath'
    - 'espeak_ng_Initialize'
    - 'espeak_ng_Terminate'
    - 'espeak_ng_CompileIntonationPath'
    - 'espeak_ng_CompilePhonemeDataPath'
    - 'espeak_ng_CompileDictionary'
    - 'espeak_TextToPhonemesWithTerminator'

structs:
  include:
    - 'espeak_VOICE'

enums:
  include:
    - 'espeak_.*'

typedefs:
  include:
    - 'espeak_.*'

unions:
  exclude:
    - '.*'

macros:
  exclude:
    - '.*'

unnamed-enums:
  exclude:
    - '.*'

globals:
  exclude:
    - '.*'

silence-enum-warning: true

preamble: |
  // AUTO-GENERATED by ffigen - DO NOT EDIT
  // Run `dart run ffigen` to regenerate
  //
  // ignore_for_file: non_constant_identifier_names
  // ignore_for_file: unused_field
  // ignore_for_file: unused_element
  // ignore_for_file: camel_case_types
